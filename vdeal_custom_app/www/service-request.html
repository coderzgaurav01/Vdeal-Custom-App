<!-- apps/vdeal_custom_app/vdeal_custom_app/www/service-request.html -->

{% extends "templates/web.html" %}

{% block page_content %}

<style>

    body {
        background: #f5f6f8;
    }

    .fms-card {
        background: #fff;
        border-radius: 18px;
        padding: 40px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .section-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 25px;
        color: #222;
    }

    .sub-title {
        font-size: 18px;
        font-weight: 700;
        margin-top: 35px;
        margin-bottom: 20px;
        color: #d71920;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }

    label {
        font-weight: 600;
        margin-bottom: 6px;
        color: #555;
    }

    .form-control,
    .form-select {
        height: 48px;
        border-radius: 10px;
    }

    textarea.form-control {
        height: auto;
    }

    .submit-btn {
        background: #e31b23;
        border: none;
        color: white;
        padding: 14px;
        border-radius: 10px;
        width: 100%;
        font-size: 18px;
        font-weight: 600;
        transition: 0.3s;
    }

    .submit-btn:hover {
        background: #c41219;
    }

    .radio-group {
        display: flex;
        gap: 30px;
        margin-top: 10px;
    }

    .radio-group input {
        margin-right: 8px;
    }

</style>

<div class="container my-5">

    <div class="fms-card">

        <div class="section-title">
            Service Request Form
        </div>

        <form id="service-request-form" enctype="multipart/form-data">

            <!-- REQUEST TYPE -->

            <div class="mb-4">

                <label class="mb-3 d-block">
                    REQUEST TYPE
                </label>

                <div class="radio-group">

                    <div>

                        <input
                            type="radio"
                            name="request_type"
                            value="New SR"
                            checked
                        >

                        New SR

                    </div>

                    <div>

                        <input
                            type="radio"
                            name="request_type"
                            value="Existing SR"
                        >

                        Existing SR (Follow-up)

                    </div>

                </div>

            </div>

            <!-- EXISTING SR -->

            <div
                class="row mt-3"
                id="existing-sr-section"
                style="display:none;"
            >

                <div class="col-md-6 mb-3">

                    <label>
                        Existing SR ID
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="existing_sr_id"
                        placeholder="VSL/2026/SR001"
                    >

                </div>

            </div>

            <!-- CUSTOMER DETAILS -->

            <div class="sub-title">
                Customer Details
            </div>

            <div class="row">

                <div class="col-md-8 mb-3">

                    <label>
                        Customer Name
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="customer_name"
                        placeholder="Company Name"
                        required
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label>
                        Location
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="location"
                        placeholder="City, State"
                    >

                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label>
                        Contact Person
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="contact_person"
                        placeholder="Full Name"
                        required
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label>
                        Email ID
                    </label>

                    <input
                        type="email"
                        class="form-control"
                        id="email_id"
                        placeholder="email@example.com"
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label>
                        Phone Number
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="mobile_number"
                        placeholder="+91 XXXXXX XXXXX"
                        required
                    >

                </div>

            </div>

            <!-- SERVICE DETAILS -->

            <div class="sub-title">
                Service Details
            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>
                        Nature Of Job
                    </label>

                    <select
                        class="form-select"
                        id="nature_of_job"
                    >

                        <option value="">
                            Select...
                        </option>

                        <option>
                            Commissioning
                        </option>

                        <option>
                            Service
                        </option>

                        <option>
                            AMC
                        </option>

                        <option>
                            Retrofit
                        </option>

                        <option>
                            Troubleshooting
                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        Service Required For
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="service_required_for"
                        placeholder="Machine/Equipment ID"
                    >

                </div>

            </div>

            <!-- PAYMENT DETAILS -->

            <div class="sub-title">
                Payment Details
            </div>

            <div class="row">

                <div class="col-md-4 mb-3">

                    <label>
                        Payment Type
                    </label>

                    <select
                        class="form-select"
                        id="payment_type"
                    >

                        <option value="">
                            Select Payment...
                        </option>

                        <option>
                            Paid
                        </option>

                        <option>
                            Manufacturing PO
                        </option>

                        <option>
                            Trading PO
                        </option>

                        <option>
                            Free
                        </option>

                    </select>

                </div>

                <div class="col-md-4 mb-3">

                    <label>
                        Estimated Cost / Budget
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        id="estimated_cost"
                        placeholder="Amount"
                    >

                </div>

                <div class="col-md-4 mb-3">

                    <label>
                        PO Number
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="po_number"
                        placeholder="PO/2026/XYZ"
                    >

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>
                        PO Date
                    </label>

                    <input
                        type="date"
                        class="form-control"
                        id="po_date"
                    >

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        Attached PO Copy
                    </label>

                    <input
                        type="file"
                        class="form-control"
                        id="po_copy"
                    >

                </div>

            </div>

            <!-- PRIORITY DETAILS -->

            <div class="sub-title">
                Priority Details
            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>
                        Expected Visit Date
                    </label>

                    <input
                        type="date"
                        class="form-control"
                        id="expected_visit_date"
                    >

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        Priority Level
                    </label>

                    <select
                        class="form-select"
                        id="priority_level"
                    >

                        <option value="">
                            Select Priority...
                        </option>

                        <option>
                            High
                        </option>

                        <option>
                            Medium
                        </option>

                        <option>
                            Low
                        </option>

                    </select>

                </div>

            </div>
            <div
                class="row"
                id="priority-reason-section"
                style="display:none;"
            >

                <div class="col-md-12 mb-3">

                    <label>
                        Priority Reason
                    </label>

                    <textarea
                        class="form-control"
                        id="priority_reason"
                        rows="4"
                        placeholder="Please explain why this request is high priority..."
                    ></textarea>

                </div>

            </div>

            <!-- SCOPE OF WORK -->

            <div class="sub-title">
                Scope Of Work
            </div>

            <div class="mb-4">

                <textarea
                    class="form-control"
                    rows="5"
                    id="scope_of_work"
                    placeholder="Detail the technical tasks..."
                ></textarea>

            </div>

            <!-- SUBMIT -->

            <button
                type="submit"
                class="submit-btn"
            >

                Submit Request

            </button>

        </form>

    </div>

</div>

<!-- SHOW / HIDE EXISTING SR -->

<script>

document
    .querySelectorAll(
        'input[name="request_type"]'
    )
    .forEach(radio => {

        radio.addEventListener(
            "change",
            function() {

                let section =
                    document.getElementById(
                        "existing-sr-section"
                    );

                if (
                    this.value === "Existing SR"
                ) {

                    section.style.display =
                        "flex";

                } else {

                    section.style.display =
                        "none";

                    document.getElementById(
                        "existing_sr_id"
                    ).value = "";

                }

            }
        );

    });

</script>
<script>

document
    .getElementById(
        "priority_level"
    )
    .addEventListener(
        "change",
        function() {

            let priorityReasonSection =
                document.getElementById(
                    "priority-reason-section"
                );

            if (
                this.value === "High"
            ) {

                priorityReasonSection.style.display =
                    "flex";

            } else {

                priorityReasonSection.style.display =
                    "none";

                document.getElementById(
                    "priority_reason"
                ).value = "";

            }

        }
    );

</script>

<script>

document.getElementById(
    "service-request-form"
).addEventListener(
    "submit",
    async function(e) {

        e.preventDefault();

        let btn = document.querySelector(
            ".submit-btn"
        );

        btn.disabled = true;
        btn.innerText = "Submitting...";

        let formData = new FormData();

        formData.append(
            "request_type",
            document.querySelector(
                'input[name="request_type"]:checked'
            ).value
        );

        formData.append(
            "existing_sr_id",
            document.getElementById(
                "existing_sr_id"
            ).value
        );

        formData.append(
            "customer_name",
            document.getElementById(
                "customer_name"
            ).value
        );

        formData.append(
            "location",
            document.getElementById(
                "location"
            ).value
        );

        formData.append(
            "contact_person",
            document.getElementById(
                "contact_person"
            ).value
        );

        formData.append(
            "email_id",
            document.getElementById(
                "email_id"
            ).value
        );

        formData.append(
            "mobile_number",
            document.getElementById(
                "mobile_number"
            ).value
        );

        formData.append(
            "nature_of_job",
            document.getElementById(
                "nature_of_job"
            ).value
        );

        formData.append(
            "service_required_for",
            document.getElementById(
                "service_required_for"
            ).value
        );

        formData.append(
            "payment_type",
            document.getElementById(
                "payment_type"
            ).value
        );

        formData.append(
            "estimated_cost",
            document.getElementById(
                "estimated_cost"
            ).value
        );

        formData.append(
            "po_number",
            document.getElementById(
                "po_number"
            ).value
        );

        formData.append(
            "po_date",
            document.getElementById(
                "po_date"
            ).value
        );

        formData.append(
            "expected_visit_date",
            document.getElementById(
                "expected_visit_date"
            ).value
        );

        formData.append(
            "priority_level",
            document.getElementById(
                "priority_level"
            ).value
        );

        formData.append(
            "priority_reason",
            document.getElementById(
                "priority_reason"
            ).value
        );

        formData.append(
            "scope_of_work",
            document.getElementById(
                "scope_of_work"
            ).value
        );

        // FILE

        let poFile = document.getElementById(
            "po_copy"
        ).files[0];

        if (poFile) {

            formData.append(
                "po_copy",
                poFile
            );

        }

        try {

            let response = await fetch(

                "/api/method/vdeal_custom_app.api.service_request.create_service_request",

                {
                    method: "POST",
                    headers: {
                        "X-Frappe-CSRF-Token":
                            frappe.csrf_token
                    },
                    body: formData
                }

            );
            let data = await response.json();

                console.log(data);

                if (data.exc) {

                    console.error(data.exc);

                    frappe.msgprint({

                        title: "Server Error",

                        message: data.exc,

                        indicator: "red"

                    });

                }
                else if (data.message) {

                    frappe.msgprint({

                        title: "Success",

                        message:
                            `Service Request Created: ${data.message}`,

                        indicator: "green"

                    });

                    setTimeout(() => {

                        window.location.reload();

                    }, 15000);

                }
                else {

                    frappe.msgprint({

                        title: "Error",

                        message:
                            "Unknown error occurred.",

                        indicator: "red"

                    });

                }
            } catch (error) {

            console.error(error);

            frappe.msgprint({

                title: "Error",

                message:
                    "Something went wrong. Check console.",

                indicator: "red"

            });

        }

        btn.disabled = false;

        btn.innerText = "Submit Request";

    }
);

</script>

{% endblock %}
